<style>
:root{--bg:#0f0d1a;--fg:#e8e4f0;--accent:#a78bfa;--muted:#9ca3af;--card:#1a1726}
body{background:var(--bg)!important;color:var(--fg)!important;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
a{color:var(--accent)!important}
